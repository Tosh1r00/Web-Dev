<div class="detail">
  <div *ngIf="loading" class="loading">Loading...</div>

  <div *ngIf="!loading && album">
    <button class="btn-back" (click)="goBack()">← Back</button>

    <h1>Album #{{ album.id }}</h1>
    <p class="user">User ID: {{ album.userId }}</p>

    <div class="edit-section">
      <label>Title</label>
      <input [(ngModel)]="album.title" placeholder="Album title" />
      <button class="btn-save" (click)="saveAlbum()">Save</button>
      <span *ngIf="saved" class="saved-msg">✓ Saved!</span>
    </div>

    <button class="btn-photos" (click)="goToPhotos()">View Photos</button>
  </div>
</div>
