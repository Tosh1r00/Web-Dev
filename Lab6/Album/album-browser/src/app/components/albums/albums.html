<div class="albums">
  <h1>Albums</h1>

  <div *ngIf="loading" class="loading">Loading...</div>

  <ul *ngIf="!loading">
    <li *ngFor="let album of albums" (click)="goToAlbum(album.id)">
      <span class="album-id">#{{ album.id }}</span>
      <span class="album-title">{{ album.title }}</span>
      <button (click)="deleteAlbum(album.id, $event)">Delete</button>
    </li>
  </ul>
</div>
